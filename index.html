<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/nabi7app/nabi-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="나비 (나의 비서) - 언제나 열려있는 나만의 업무 비서. 비상장주식 중개 업무용 일일 메모 + 자동분류 + 계산기 통합 플랫폼" />

        color: #94a3b8;
